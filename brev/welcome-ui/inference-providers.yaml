# Inference provider list and per-partner instructions for the welcome-ui picker.
# Edit this file instead of HTML — the server renders it into the Install OpenClaw modal.
#
# Structure:
#   nvidia    - Free endpoint provider (one row in picker)
#     displayName, logoFile
#   partners  - Paid partners (5×2 grid)
#     id       - Used for data-provider-id and instruction block id
#     name     - Display name under logo
#     logoFile - Filename in sandboxes/openclaw-nvidia/ncp-logos/
#     instructions - Optional; same shape as other-agents (title, intro?, steps[])
#       steps[].title, commands[], copyable?, description?

nvidia:
  displayName: NVIDIA
  logoFile: nvidia.png
  free: true

partners:
  - id: baseten
    name: Baseten
    logoFile: baseten.webp
    instructions:
      title: Get your Baseten API key
      intro: Sign up at Baseten and create an API key to use their inference endpoints.
      steps:
        - title: Sign up at Baseten
          commands:
            - "Visit https://www.baseten.co/ and create an account."
        - title: Create an API key
          commands:
            - "In the Baseten dashboard, go to API keys and create a new key."
          copyable: false
        - title: Add provider in OpenShell
          commands:
            - "After launching OpenClaw, go to Inference settings and add Baseten with your API key."
  - id: bitdeer
    name: Bitdeer
    logoFile: bitdeer.webp
    instructions:
      title: Get your Bitdeer API key
